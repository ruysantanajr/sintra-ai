name: Gepeto - Queue Local Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: gepeto-queue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  queue_gepeto:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Mark PR for local Gepeto review
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const labels = [
              { name: 'gepeto:pending', color: 'fbca04', description: 'PR aguardando auditoria local do Gepeto' },
              { name: 'gepeto:approved', color: '0e8a16', description: 'Auditoria Gepeto aprovada' },
              { name: 'gepeto:rejected', color: 'b60205', description: 'Auditoria Gepeto reprovada' },
              { name: 'ready-for-ruy', color: '1d76db', description: 'Trabalho inteiro pronto para validacao do Ruy' },
              { name: 'claudinho:fixing', color: '5319e7', description: 'Claudinho assumiu a correcao' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['gepeto:pending'],
            });

            const marker = `<!-- gepeto-pending:${headSha} -->`;
            const body = [
              marker,
              'Gepeto: PR marcada para auditoria local via Codex.',
              '',
              `Head SHA: \`${headSha}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
