name: auditoria

# Camada 1 — Auditoria automática por análise estática (sem LLM, sem serviço externo).
# Substitui o antigo fluxo Gepeto. Roda em todo PR e no push para a branch default.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ MODO AVISO ATIVO                                                          │
# │ Os passos de análise usam `continue-on-error: true`: eles RODAM e         │
# │ REPORTAM os achados, mas NÃO reprovam o PR. Período de calibração.        │
# │                                                                           │
# │ >>> PARA TORNAR BLOQUEANTE (após 1–2 semanas): troque, em cada passo      │
# │     marcado `# [MODO]`, `continue-on-error: true` -> `false` (ou remova)  │
# │     e adicione o job "auditoria" como required check na branch protection.│
# └─────────────────────────────────────────────────────────────────────────┘

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # p/ upload de SARIF (semgrep/gitleaks) quando aplicável

concurrency:
  group: auditoria-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Segredos vazados ──────────────────────────────────────────────────────
  segredos:
    name: Segredos (gitleaks)
    # ignora PR em rascunho
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Instalar gitleaks (binário oficial, sem licença)
        run: |
          VER=8.24.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        continue-on-error: true   # [MODO] aviso -> trocar para false p/ bloquear
        run: gitleaks detect --source . --redact --no-banner --verbose --exit-code 1

  # ── Análise estática de segurança/bugs ────────────────────────────────────
  sast:
    name: SAST (semgrep)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan
        continue-on-error: true   # [MODO] aviso -> trocar para false p/ bloquear
        run: semgrep scan --config p/ci --config p/secrets --error --metrics off

  # ── Node/TS: lint + typecheck (auto-detecta package.json) ─────────────────
  node:
    name: Lint & Typecheck (Node/TS)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar projeto Node
        id: detect
        run: |
          if [ -f package.json ]; then echo "node=true" >> "$GITHUB_OUTPUT";
          else echo "node=false" >> "$GITHUB_OUTPUT"; echo "Sem package.json — job Node ignorado."; fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node == 'true'
        with:
          node-version: 20
      - name: Instalar dependências
        if: steps.detect.outputs.node == 'true'
        run: npm ci || npm install
      - name: Typecheck
        if: steps.detect.outputs.node == 'true'
        continue-on-error: true   # [MODO] aviso -> trocar para false p/ bloquear
        run: |
          if npm run | grep -qE '^\s+typecheck'; then npm run typecheck
          elif [ -f tsconfig.json ]; then npx --yes tsc --noEmit
          else echo "Sem typecheck configurado — pulado."; fi
      - name: Lint
        if: steps.detect.outputs.node == 'true'
        continue-on-error: true   # [MODO] aviso -> trocar para false p/ bloquear
        run: |
          if npm run | grep -qE '^\s+lint'; then npm run lint
          else echo "Sem script de lint — pulado."; fi

  # ── Python: lint (auto-detecta requirements.txt/pyproject.toml) ───────────
  python:
    name: Lint (Python / ruff)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar projeto Python
        id: detect
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then echo "py=true" >> "$GITHUB_OUTPUT";
          else echo "py=false" >> "$GITHUB_OUTPUT"; echo "Sem projeto Python — job ignorado."; fi
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.py == 'true'
        with:
          python-version: '3.12'
      - name: ruff check
        if: steps.detect.outputs.py == 'true'
        continue-on-error: true   # [MODO] aviso -> trocar para false p/ bloquear
        run: |
          pipx install ruff || pip install ruff
          ruff check . || true
